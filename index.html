<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min Startside</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --btn-bg: #2c2c2c;
    --btn-hover: #3a3a3a;
}

body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
    color: white;
}

.container {
    max-width: 1000px;
    margin: 0 auto;
}

h1 {
    text-align: center;
    font-weight: 500;
    font-size: 2.5rem;
    margin-bottom: 50px;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
}

.category {
    margin-bottom: 40px;
}

.category h2 {
    border-bottom: 2px solid rgba(255,255,255,0.4);
    padding-bottom: 10px;
    font-size: 1.2rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 15px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 15px;
}

.btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 10px;
    background: var(--btn-bg);
    border-radius: 12px;
    border: none;
    color: white;
    text-decoration: none;
    transition: all 0.25s ease;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.4);
}

.btn:hover {
    background: var(--btn-hover);
    transform: translateY(-3px);
    box-shadow: 4px 4px 15px rgba(0,0,0,0.6);
}

.btn i {
    font-size: 28px;
    margin-bottom: 8px;
}

/* Fargeikoner */
.btn-facebook i { color: #1877F2; }
.btn-hudd i { color: #FF6B6B; }
.btn-twitter i { color: #1DA1F2; }
.btn-linkedin i { color: #0077B5; }
.btn-google i { color: #DB4437; }
.btn-drive i { color: #0F9D58; }
.btn-dropbox i { color: #0061FF; }
.btn-mail i { color: #D44638; }
.btn-photos i { color: #FFBB00; }
.btn-calendar i { color: #4285F4; }
.btn-spotify i { color: #1DB954; }
.btn-applemusic i { color: #FA233B; }
.btn-nrk i { color: #FF0000; }
.btn-netflix i { color: #E50914; }
.btn-youtube i { color: #FF0000; }

.btn span {
    font-size: 0.9rem;
    text-align: center;
}

@media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="container">
    <h1>Min Startside</h1>

    <!-- Sosialt -->
    <div class="category">
        <h2>Sosialt</h2>
        <div class="grid">
            <a href="https://facebook.com" class="btn btn-facebook"><i class="fab fa-facebook-f"></i><span>Facebook</span></a>
            <a href="https://hudd.no" class="btn btn-hudd"><i class="fas fa-comments"></i><span>Hudd</span></a>
            <a href="https://twitter.com" class="btn btn-twitter"><i class="fab fa-twitter"></i><span>Twitter</span></a>
            <a href="https://www.linkedin.com" class="btn btn-linkedin"><i class="fab fa-linkedin-in"></i><span>LinkedIn</span></a>
        </div>
    </div>

    <!-- Sky & Konto -->
    <div class="category">
        <h2>Sky & Konto</h2>
        <div class="grid">
            <a href="https://www.icloud.com" class="btn btn-applemusic"><i class="fas fa-cloud"></i><span>iCloud</span></a>
            <a href="https://drive.google.com" class="btn btn-drive"><i class="fas fa-hdd"></i><span>Drive</span></a>
            <a href="https://www.dropbox.com" class="btn btn-dropbox"><i class="fas fa-box"></i><span>Dropbox</span></a>
        </div>
    </div>

    <!-- Google -->
    <div class="category">
        <h2>Google</h2>
        <div class="grid">
            <a href="https://www.google.com/" class="btn btn-google"><i class="fab fa-google"></i><span>Søk</span></a>
            <a href="https://maps.google.com/" class="btn btn-google"><i class="fas fa-map-location-dot"></i><span>Maps</span></a>
            <a href="https://mail.google.com/" class="btn btn-mail"><i class="fas fa-envelope"></i><span>Gmail</span></a>
            <a href="https://photos.google.com/" class="btn btn-photos"><i class="fas fa-images"></i><span>Photos</span></a>
            <a href="https://calendar.google.com/" class="btn btn-calendar"><i class="fas fa-calendar"></i><span>Kalender</span></a>
        </div>
    </div>

    <!-- Underholdning -->
    <div class="category">
        <h2>Underholdning</h2>
        <div class="grid">
            <a href="https://spotify.com" class="btn btn-spotify"><i class="fab fa-spotify"></i><span>Spotify</span></a>
            <a href="https://music.apple.com/" class="btn btn-applemusic"><i class="fab fa-apple"></i><span>Apple Music</span></a>
            <a href="https://radio.nrk.no/" class="btn btn-nrk"><i class="fas fa-radio"></i><span>NRK Radio</span></a>
            <a href="https://tv.nrk.no/" class="btn btn-nrk"><i class="fas fa-play"></i><span>NRK TV</span></a>
            <a href="https://netflix.com" class="btn btn-netflix"><i class="fas fa-film"></i><span>Netflix</span></a>
            <a href="https://youtube.com" class="btn btn-youtube"><i class="fab fa-youtube"></i><span>YouTube</span></a>
        </div>
    </div>

</div>
</body>
</html>
