<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Startside</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --glass-hover: rgba(255, 255, 255, 0.35);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            color: white;
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1601758123927-7c0d01d346be?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 { 
            text-align: center; 
            font-weight: 400; 
            font-size: 2.5rem;
            margin-bottom: 50px; 
            text-shadow: 2px 2px 6px rgba(0,0,0,0.7); 
        }

        .category {
            margin-bottom: 40px;
        }

        .category h2 { 
            border-bottom: 2px solid rgba(255,255,255,0.5); 
            padding-bottom: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.95;
            margin-bottom: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 8px;
            background: var(--glass);
            border-radius: 10px;
            border: none;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            box-shadow: 3px 3px 10px rgba(0,0,0,0.4);
        }

        .btn:hover {
            background: var(--glass-hover);
            transform: translateY(-3px);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.6);
        }

        .btn i { 
            font-size: 28px; 
            margin-bottom: 8px; 
        }

        .btn span { 
            font-size: 0.9rem; 
            text-align: center;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Min Startside - Alt på ett sted</h1>

        <!-- Sosialt -->
        <div class="category">
            <h2>Sosialt</h2>
            <div class="grid">
                <a href="https://facebook.com" class="btn"><i class="fab fa-facebook-f"></i><span>Facebook</span></a>
                <a href="https://hudd.no" class="btn"><i class="fas fa-comments"></i><span>Hudd</span></a>
                <a href="https://twitter.com" class="btn"><i class="fab fa-twitter"></i><span>Twitter</span></a>
                <a href="https://www.linkedin.com" class="btn"><i class="fab fa-linkedin-in"></i><span>LinkedIn</span></a>
            </div>
        </div>

        <!-- Sky & Konto -->
        <div class="category">
            <h2>Sky & Konto</h2>
            <div class="grid">
                <a href="https://www.icloud.com" class="btn"><i class="fas fa-cloud"></i><span>iCloud</span></a>
                <a href="https://drive.google.com" class="btn"><i class="fas fa-hdd"></i><span>Google Drive</span></a>
                <a href="https://www.dropbox.com" class="btn"><i class="fas fa-box"></i><span>Dropbox</span></a>
            </div>
        </div>

        <!-- Google -->
        <div class="category">
            <h2>Google</h2>
            <div class="grid">
                <a href="https://www.google.com/" class="btn"><i class="fab fa-google"></i><span>Søk</span></a>
                <a href="https://maps.google.com/" class="btn"><i class="fas fa-map-location-dot"></i><span>Maps</span></a>
                <a href="https://mail.google.com/" class="btn"><i class="fas fa-envelope"></i><span>Gmail</span></a>
                <a href="https://photos.google.com/" class="btn"><i class="fas fa-images"></i><span>Photos</span></a>
                <a href="https://calendar.google.com/" class="btn"><i class="fas fa-calendar"></i><span>Kalender</span></a>
                <a href="https://keep.google.com/" class="btn"><i class="fas fa-sticky-note"></i><span>Keep</span></a>
            </div>
        </div>

        <!-- Nyheter -->
        <div class="category">
            <h2>Nyheter</h2>
            <div class="grid">
                <a href="https://www.vg.no" class="btn"><i class="fas fa-newspaper"></i><span>VG</span></a>
                <a href="https://www.dagbladet.no" class="btn"><i class="fas fa-newspaper"></i><span>Dagbladet</span></a>
                <a href="https://www.nrk.no" class="btn"><i class="fas fa-broadcast-tower"></i><span>NRK</span></a>
                <a href="https://www.aftenposten.no" class="btn"><i class="fas fa-newspaper"></i><span>Aftenposten</span></a>
            </div>
        </div>

        <!-- Underholdning -->
        <div class="category">
            <h2>Underholdning</h2>
            <div class="grid">
                <a href="https://spotify.com" class="btn"><i class="fab fa-spotify"></i><span>Spotify</span></a>
                <a href="https://music.apple.com/" class="btn"><i class="fab fa-apple"></i><span>Apple Music</span></a>
                <a href="https://radio.nrk.no/" class="btn"><i class="fas fa-radio"></i><span>NRK Radio</span></a>
                <a href="https://tv.nrk.no/" class="btn"><i class="fas fa-play"></i><span>NRK TV</span></a>
                <a href="https://netflix.com" class="btn"><i class="fas fa-film"></i><span>Netflix</span></a>
                <a href="https://youtube.com" class="btn"><i class="fab fa-youtube"></i><span>YouTube</span></a>
            </div>
        </div>

    </div>
</body>
</html>
