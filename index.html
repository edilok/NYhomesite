<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Startside</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            /* Gjort mer gjennomsiktig som forespurt */
            --glass: rgba(255, 255, 255, 0.05);
            --glass-hover: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            color: white;
            min-height: 100vh;
            /* Her er bildet ditt lagt inn */
            background: url('IMG_8023.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 { text-align: center; font-weight: 300; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        .weather-box {
            background: var(--glass);
            margin-bottom: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .category h2 { 
            border-bottom: 1px solid rgba(255,255,255,0.3); 
            padding-bottom: 10px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 15px;
            margin-bottom: 40px;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            background: var(--glass);
            border: none;
            border-radius: 0; /* Helt firkantet */
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            /* Skygge: 1mm (ca 3.8px) oppe og til høyre i grått */
            box-shadow: 3.8px -3.8px 0px 0px rgba(128, 128, 128, 0.6);
        }

        .btn:hover {
            background: var(--glass-hover);
            transform: translate(-2px, 2px);
            box-shadow: 1px -1px 0px 0px rgba(128, 128, 128, 0.8);
        }

        .btn i { font-size: 28px; margin-bottom: 10px; }
        .btn span { font-size: 0.85rem; font-weight: 500; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Velkommen</h1>

<!-- Vær-seksjon (WeatherWidget.io - Gratis og uten API-nøkkel) -->
<!-- Enkel Vær-widget fra Yr -->
<div class="weather-box">
    <iframe 
        src="https://yr.no" 
        width="100%" 
        height="120" 
        frameborder="0" 
        style="border:none; background: rgba(255,255,255,0.1); display: block;">
    </iframe>
</div>

    <div class="category">
        <h2>Sosialt & Sky</h2>
        <div class="grid">
            <a href="https://facebook.com" class="btn"><i class="fab fa-facebook-f"></i><span>Facebook</span></a>
            <a href="https://hudd.no" class="btn"><i class="fas fa-comments"></i><span>Hudd</span></a>
            <a href="https://icloud.com" class="btn"><i class="fas fa-cloud"></i><span>iCloud</span></a>
        </div>
    </div>

    <div class="category">
        <h2>Google Verktøy</h2>
        <div class="grid">
            <a href="https://google.no" class="btn"><i class="fab fa-google"></i><span>Søk</span></a>
            <a href="https://google.com" class="btn"><i class="fas fa-map-location-dot"></i><span>Maps</span></a>
            <a href="https://gmail.com" class="btn"><i class="fas fa-envelope-open-text"></i><span>Gmail</span></a>
            <a href="https://google.com" class="btn"><i class="fas fa-images"></i><span>Photos</span></a>
            <a href="https://google.com" class="btn"><i class="fas fa-calendar-check"></i><span>Kalender</span></a>
        </div>
    </div>

    <div class="category">
        <h2>Nyheter & Vær</h2>
        <div class="grid">
            <a href="https://vg.no" class="btn"><i class="fas fa-bold"></i><span>VG</span></a>
            <a href="https://db.no" class="btn"><i class="fas fa-newspaper"></i><span>Dagbladet</span></a>
            <a href="https://dt.no" class="btn"><i class="fas fa-house-user"></i><span>DT</span></a>
            <a href="https://tb.no" class="btn"><i class="fas fa-anchor"></i><span>TB</span></a>
            <a href="https://sb.no" class="btn"><i class="fas fa-ship"></i><span>SB</span></a>
            <a href="https://vaerpent.no" class="btn"><i class="fas fa-cloud-sun"></i><span>Værpent</span></a>
        </div>
    </div>

    <div class="category">
        <h2>Media & Musikk</h2>
        <div class="grid">
            <a href="https://spotify.com" class="btn"><i class="fab fa-spotify"></i><span>Spotify</span></a>
            <a href="https://apple.com" class="btn"><i class="fab fa-apple"></i><span>Apple Music</span></a>
            <a href="https://nrk.no" class="btn"><i class="fas fa-broadcast-tower"></i><span>NRK Radio</span></a>
            <a href="https://nrk.no" class="btn"><i class="fas fa-play-circle"></i><span>NRK TV</span></a>
            <a href="https://netflix.com" class="btn"><i class="fas fa-ticket-alt"></i><span>Netflix</span></a>
            <a href="https://youtube.com" class="btn"><i class="fab fa-youtube"></i><span>YouTube</span></a>
        </div>
    </div>
</div>

</body>
</html>
